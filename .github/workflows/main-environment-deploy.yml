name: Main Environment Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deployment_environment:
        description: "GitHub Environment to deploy to"
        required: true
        type: choice
        default: production
        options:
          - dev
          - beta
          - production

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-deploy-${{ github.event_name == 'workflow_dispatch' && inputs.deployment_environment || vars.DEPLOY_ENVIRONMENT || 'production' }}
  cancel-in-progress: false

jobs:
  deploy_backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.deployment_environment || vars.DEPLOY_ENVIRONMENT || 'production' }}
    env:
      DEPLOY_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.deployment_environment || vars.DEPLOY_ENVIRONMENT || 'production' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'af-south-1' }}
      ACCOUNT_ID: ${{ vars.ACCOUNT_ID }}
      WEB_ENABLED: ${{ vars.WEB_ENABLED || 'false' }}
      WEB_DOMAIN_NAME: ${{ vars.WEB_DOMAIN_NAME }}
      WEB_HOSTED_ZONE_NAME: ${{ vars.WEB_HOSTED_ZONE_NAME }}
      WEB_HOSTED_ZONE_ID: ${{ vars.WEB_HOSTED_ZONE_ID }}
      WEB_CERTIFICATE_ARN: ${{ vars.WEB_CERTIFICATE_ARN }}
      WEB_BUILD_PATH: ${{ vars.WEB_BUILD_PATH }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment environment
        run: |
          set -euo pipefail
          case "${DEPLOY_ENVIRONMENT}" in
            dev|beta|production) ;;
            *)
              echo "Invalid DEPLOY_ENVIRONMENT: ${DEPLOY_ENVIRONMENT}"
              echo "Allowed values: dev, beta, production."
              exit 1
              ;;
          esac
          echo "Deploy target environment: ${DEPLOY_ENVIRONMENT}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC role)
        if: env.AWS_ROLE_TO_ASSUME != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (access key fallback)
        if: env.AWS_ROLE_TO_ASSUME == '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate AWS deploy configuration
        run: |
          set -euo pipefail
          if [ -z "${AWS_ROLE_TO_ASSUME}" ] && { [ -z "${AWS_ACCESS_KEY_ID}" ] || [ -z "${AWS_SECRET_ACCESS_KEY}" ]; }; then
            echo "Missing AWS credentials. Set either:"
            echo "- secret AWS_ROLE_TO_ASSUME, or"
            echo "- secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY."
            exit 1
          fi

      - name: Deploy CDK stacks
        run: |
          set -euo pipefail
          npx cdk deploy "morara-${DEPLOY_ENVIRONMENT}/*" --require-approval never --app "node dist/infra/cdk/bin/app.js"
